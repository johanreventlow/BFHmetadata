# =============================================================================
# Migration config — bfh_db_migration
# =============================================================================
# Connection-info til source (Access) og target (Supabase).
# Hemmeligheder (passwords, service-role-keys) hører IKKE her — brug .Renviron.
# Denne fil OK at zippe + transportere. .Renviron skal IKKE i ZIP.
# =============================================================================

default:
  # Source: Access via ODBC (kun læses på Windows)
  access:
    dsn: "dataportal_2024"
    encoding: "UTF8"

  # Target: Supabase — Session pooler (IPv4, port 5432).
  # Direct connection (db.<ref>.supabase.co) er IPv6-only → duer ej her.
  # Strengen fra Dashboard > Connect > Connection String > Session pooler.
  # Region: eu-west-1 (Irland) — EU/GDPR-dækket.
  supabase:
    host: "aws-0-eu-west-1.pooler.supabase.com"
    port: 5432
    dbname: "postgres"
    user: "postgres.ijgwlqpbjcfffdmxeahh"   # pooler-user = postgres.<ref>
    sslmode: "require"
    # password hentes via Sys.getenv("SUPABASE_DB_PASSWORD") fra .Renviron

  # Lokal Supabase-instans (valgfri, til udvikling via supabase CLI)
  supabase_local:
    host: "localhost"
    port: 54322
    dbname: "postgres"
    user: "postgres"
    sslmode: "disable"

  # Output-stier (relative til arbejdsmappen)
  paths:
    schema_yaml: "access_schema.yaml"
    data_dump_dir: "access_data_dump"
    ddl_sql: "01_schema.sql"
    log_file: "introspection_log.txt"
